<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>NULL | Archive</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background-color: #000; 
            font-family: 'Inter', sans-serif;
        }

        #unity-container { position: absolute; width: 100%; height: 100%; }
        #unity-canvas { width: 100%; height: 100%; background: #000; }

        /* The Loading Screen - Mimics the original logic but looks clean */
        #unity-loading-bar { 
            position: absolute; left: 50%; top: 50%; 
            transform: translate(-50%, -50%); 
            display: block; z-index: 10;
        }

        .loader-title {
            color: #ffffff;
            font-weight: 900;
            font-size: 2.5rem;
            letter-spacing: 15px;
            text-align: center;
            margin-bottom: 20px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        #unity-progress-bar-empty { 
            width: 300px; height: 4px; background: rgba(255, 255, 255, 0.1); 
            border-radius: 2px; overflow: hidden; margin: 0 auto;
        }

        #unity-progress-bar-full { 
            width: 0%; height: 100%; background: #fff; 
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            transition: width 0.3s;
        }

        #status-text {
            color: #444;
            font-size: 0.7rem;
            letter-spacing: 3px;
            text-align: center;
            margin-top: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="unity-container">
        <canvas id="unity-canvas" tabindex="-1"></canvas>
        
        <div id="unity-loading-bar">
            <div class="loader-title">NULL</div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
            <div id="status-text">Synchronizing Data...</div>
        </div>
    </div>

    <script>
        // Bypass SDK checks so the game doesn't hang looking for ads
        window.YaGames = { init: () => Promise.resolve({ getPlayer: () => Promise.resolve({}) }) };
        window.SDK_OPTIONS = { gameId: "clean", onEvent: () => {} };

        const buildUrl = "https://cdn.jsdelivr.net/gh/forms-docs-slides-glgl/ngng@main/Build";
        const loaderUrl = buildUrl + "/Granny 2_web.loader.js";
        
        const config = {
            dataUrl: buildUrl + "/Granny 2_web.data",
            frameworkUrl: buildUrl + "/Granny 2_web.framework.js",
            codeUrl: buildUrl + "/Granny 2_web.wasm",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "NULL",
            productName: "Granny 2",
            productVersion: "1.0",
        };

        const canvas = document.querySelector("#unity-canvas");
        const loadingBar = document.querySelector("#unity-loading-bar");
        const progressBarFull = document.querySelector("#unity-progress-bar-full");
        const statusText = document.querySelector("#status-text");

        const script = document.createElement("script");
        script.src = loaderUrl;
        
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                // Update the bar percentage
                progressBarFull.style.width = (100 * progress) + "%";
                if(progress > 0.9) statusText.innerText = "Finalizing Archive...";
            }).then((unityInstance) => {
                // Hide loading UI when finished
                loadingBar.style.display = "none";
            }).catch((message) => {
                statusText.innerText = "DATA CORRUPTION DETECTED";
                console.error(message);
            });
        };

        document.body.appendChild(script);
    </script>
</body>
</html>
