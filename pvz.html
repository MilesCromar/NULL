<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Plants vs Zombies | NULL Archive</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* Forces the background to stay black no matter what */
        html, body {
            width: 100%;
            height: 100%;
            background-color: #000000 !important;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #player-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
        }
        #player {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
</head>
<body>
    <div id="player-container"></div>
    
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("player-container");
            container.appendChild(player);
            player.id = "player";
            
            player.load({
                url: "https://cdn.jsdelivr.net/gh/sasa24s/Sphere-compile@95d1d98dc38a920d02e6bbcf61620501b2bacfcb/tables/pvz_9_15.swf",
                allowScriptAccess: true,
                // This ensures the game stays proportional and centers itself
                scale: 'showAll',
                letterbox: 'on'
            });
        });
    </script>
</body>
</html>
