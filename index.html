<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granny | Play Now</title>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #111;
            --light: #f8fafc;
            --accent: #f59e0b;
        }

        body, html { 
            margin: 0; padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #111; /* Dark theme for horror vibes */
            color: #fff;
        }

        /* Modern Nav */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 1rem 5%; background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 800; color: var(--accent); text-decoration: none; font-size: 1.2rem; }

        /* Game Container Section */
        #game-section {
            width: 100%; height: 85vh; /* Takes up most of the screen */
            position: relative; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        #unity-container { width: 100%; height: 100%; position: relative; }
        canvas { width: 100%; height: 100%; display: block; }

        /* Controls / Info Section */
        .info-section {
            padding: 40px 10%; background: #1a1a1a;
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px;
        }
        .card { background: #222; padding: 20px; border-radius: 10px; border: 1px solid #333; }

        /* Fullscreen Button */
        #fs-btn {
            position: absolute; bottom: 20px; right: 20px; z-index: 10;
            background: var(--accent); color: #000; border: none;
            padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        #loading-overlay {
            position: absolute; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 5; transition: opacity 0.5s;
        }
        .progress-bar { width: 200px; height: 4px; background: #333; border-radius: 2px; margin-top: 15px; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.3s; }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="logo">HORROR CENTRAL</a>
        <div style="font-size: 0.9rem; color: #888;">Playing: Granny (Minimal)</div>
    </nav>

    <section id="game-section">
        <div id="loading-overlay">
            <div>GETTING READY...</div>
            <div class="progress-bar"><div id="progress-fill"></div></div>
        </div>
        
        <div id="unity-container">
            <canvas id="unity-canvas"></canvas>
            <button id="fs-btn">GO FULLSCREEN</button>
        </div>
    </section>

    <main class="info-section">
        <div class="card">
            <h3>How to Play</h3>
            <p>Use WASD to move, Mouse to look around, and E to interact. Stay quiet... she hears everything.</p>
        </div>
        <div class="card">
            <h3>Credits</h3>
            <p>Game by DVloper. Web port maintained by the community via GitHub CDN.</p>
        </div>
    </main>

    <script>
        // --- UNITY LOGIC (From your original code) ---
        window.SDK_OPTIONS = {
            gameId: "jp112o3o4hzgrnc7zaewjkrfk282pul8",
            onEvent: function (a) {
                if (a.name === "SDK_GAME_PAUSE" && myGameInstance) myGameInstance.SendMessage('AudioManager', 'MuteAudio');
                if (a.name === "SDK_GAME_START" && myGameInstance) myGameInstance.SendMessage('AudioManager', 'UnmuteAudio');
            }
        };

        const canvas = document.querySelector("#unity-canvas");
        const progressFill = document.querySelector("#progress-fill");
        const loadingOverlay = document.querySelector("#loading-overlay");
        const buildUrl = "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build";
        let myGameInstance = null;

        async function mergeUnityWebFiles(baseUrl, filePrefix, totalParts, extension) {
            const buffers = [];
            for (let i = 1; i <= totalParts; i++) {
                const response = await fetch(`${baseUrl}/${filePrefix}_part${i}.${extension}`);
                buffers.push(await response.arrayBuffer());
            }
            const combined = new Uint8Array(buffers.reduce((acc, b) => acc + b.byteLength, 0));
            let offset = 0;
            buffers.forEach(b => { combined.set(new Uint8Array(b), offset); offset += b.byteLength; });
            return combined;
        }

        async function initializeGame() {
            try {
                const [dataBuffer, wasmBuffer] = await Promise.all([
                    mergeUnityWebFiles(buildUrl, "Granny", 2, "data"),
                    mergeUnityWebFiles(buildUrl, "Granny", 2, "wasm")
                ]);

                const config = {
                    dataUrl: URL.createObjectURL(new Blob([dataBuffer])),
                    frameworkUrl: buildUrl + "/Granny.framework.js",
                    codeUrl: URL.createObjectURL(new Blob([wasmBuffer])),
                    streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/StreamingAssets",
                    companyName: "Anastasia Kazantseva",
                    productName: "Granny",
                    productVersion: "1.0",
                };

                const script = document.createElement("script");
                script.src = buildUrl + "/Granny.loader.js";
                script.onload = () => {
                    createUnityInstance(canvas, config, (progress) => {
                        progressFill.style.width = (100 * progress) + "%";
                    }).then((instance) => {
                        myGameInstance = instance;
                        loadingOverlay.style.opacity = "0";
                        setTimeout(() => loadingOverlay.style.display = "none", 500);
                    });
                };
                document.body.appendChild(script);
            } catch (e) { console.error("Game failed to load:", e); }
        }

        document.getElementById("fs-btn").onclick = () => {
            if (canvas.requestFullscreen) canvas.requestFullscreen();
            else if (canvas.webkitRequestFullscreen) canvas.webkitRequestFullscreen();
        };

        initializeGame();
    </script>
</body>
</html>
