<!DOCTYPE html>
<html lang="en">
<head>
    <title>Granny | Original Web Edition</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0a0a;
            --accent-color: #8b0000; /* Dark Blood Red */
            --text-color: #e0e0e0;
            --container-bg: #161616;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            overflow: hidden;
        }

        /* Background image with blur for atmosphere */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/background.png') no-repeat center center;
            background-size: cover;
            filter: brightness(0.3) blur(8px);
            z-index: -1;
        }

        header {
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-bottom: 2px solid var(--accent-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-family: 'Creepster', cursive;
            color: var(--accent-color);
            margin: 0;
            font-size: 2rem;
            letter-spacing: 2px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            height: calc(100vh - 60px);
        }

        .sidebar {
            background: rgba(22, 22, 22, 0.9);
            padding: 20px;
            border-right: 1px solid #333;
            overflow-y: auto;
        }

        .game-viewport {
            position: relative;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #unity-container {
            width: 95%;
            height: 90%;
            border: 4px solid #222;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            position: relative;
        }

        #unity-canvas { width: 100%; height: 100%; background: #000; }

        /* Loading Bar Styles */
        #unity-loading-bar {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            text-align: center;
        }

        .progress-box {
            width: 100%;
            height: 12px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #444;
        }

        #unity-progress-bar-full {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #500, #b00);
            transition: width 0.3s;
        }

        .controls {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #aaa;
        }

        .controls b { color: var(--accent-color); }

        #unity-warning {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
