<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | Archive</title>
    <style>
        /* --- High Visibility Dark Theme --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
        }

        body {
            /* Brighter background: Deep Gray to Black */
            background: radial-gradient(circle at center, #222222 0%, #0a0a0a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #eeeeee; /* Brighter default text */
            overflow: hidden;
        }

        .header-text {
            text-align: center;
            margin-bottom: 70px;
        }

        .header-text h1 {
            font-size: 5.5rem;
            letter-spacing: 25px;
            text-transform: uppercase;
            font-weight: 900;
            color: #ffffff; /* Pure white for maximum contrast */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            margin-left: 25px;
        }

        .header-text p {
            color: #666; /* Brighter subtext */
            letter-spacing: 8px;
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: bold;
        }

        /* --- Visible Cards --- */
        .card-container {
            display: flex;
            gap: 40px;
            perspective: 1000px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05); /* Increased opacity */
            width: 300px;
            height: 400px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15); /* Stronger border to see the tilt */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: border-color 0.5s ease, background 0.5s ease, box-shadow 0.5s ease;
        }

        .game-card:hover {
            background: rgba(0, 31, 63, 0.3); /* Stronger Navy tint */
            border-color: #0074D9;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .card-content {
            transform: translateZ(20px); 
            text-align: center;
        }

        .card-content h2 {
            font-size: 2.2rem;
            color: #cccccc; /* Light Gray */
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color 0.4s ease;
        }

        .card-content .sub-text {
            display: block;
            font-size: 0.9rem;
            color: #888; /* Mid Gray */
            letter-spacing: 2px;
            margin-top: 8px;
            margin-bottom: 35px;
            transition: color 0.4s ease;
        }

        .game-card:hover h2 { color: #ffffff; }
        .game-card:hover .sub-text { color: #0074D9; } /* Blue accent subtext on hover */

        /* --- The Button (Lights up) --- */
        .play-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #aaaaaa;
            padding: 12px 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 3px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .play-btn:hover {
            color: #ffffff;
            border-color: #0074D9;
            background: #001f3f; /* Deep Navy Blue */
            box-shadow: 0 0 20px rgba(0, 116, 217, 0.6); /* Glowing edge */
            transform: scale(1.05);
        }

        .locked {
            opacity: 0.3;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="header-text">
        <h1>NULL</h1>
        <p>SYSTEM ARCHIVE</p>
    </div>

    <div class="card-container">
        <div class="game-card">
            <div class="card-content">
                <h2>Granny</h2>
                <span class="sub-text">CHAPTER ONE</span>
                <a href="#" class="play-btn">LAUNCH</a>
            </div>
        </div>

        <div class="game-card locked">
            <div class="card-content">
                <h2>VOID</h2>
                <span class="sub-text">ENCRYPTED</span>
                <a href="#" class="play-btn">LOCKED</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        VanillaTilt.init(document.querySelectorAll(".game-card"), {
            reverse: true,      // TILTS AWAY FROM CURSOR
            max: 3,             // Slightly more tilt than before so it's visible
            speed: 2000,        // Smooth but responsive
            glare: true,
            "max-glare": 0.2,   // Brighter reflection
            scale: 1
        });
    </script>

</body>
</html>
