<!DOCTYPE html>
<html lang="en">
<head>
    <title>Game Library</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Back to the original clean vibe from your first image */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background-color: #f0f2f5; /* Light grey-blue */
            font-family: -apple-system, system-ui, sans-serif;
        }

        nav {
            padding: 15px;
            text-align: center;
            background: transparent;
            color: #64748b;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            padding: 40px;
        }

        /* The "Hello World" Style Card */
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 300px;
            transition: transform 0.2s;
        }

        .card:hover { transform: translateY(-5px); }

        h2 { margin: 0 0 10px 0; font-size: 1.5rem; color: #000; }
        p { color: #4b5563; font-size: 1rem; margin-bottom: 30px; }

        /* The specific Blue Button you liked */
        .btn-blue {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 32px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            text-transform: none; /* Removed the "all caps" kid-look */
        }

        .btn-blue:hover { background-color: #0056b3; }

        /* Fullscreen Game Area */
        #game-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
        }

        .exit-link {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 110;
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 5px;
        }

        iframe, canvas { width: 100%; height: 100%; border: none; }

        #load-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <nav>BUILD_v1.0.5</nav>

    <div class="container" id="hub">
        <div class="card">
            <h2>Granny</h2>
            <p>The original horror experience.</p>
            <button class="btn-blue" onclick="play('granny')">Launch</button>
        </div>

        <div class="card">
            <h2>Space Waves</h2>
            <p>Fast-paced arcade action.</p>
            <button class="btn-blue" onclick="play('spacewaves')">Launch</button>
        </div>
    </div>

    <div id="game-overlay">
        <a href="#" class="exit-link" onclick="location.reload()">← Back to Library</a>
        <div id="load-status">Loading System...</div>
        <div id="mount" style="width:100%; height:100%;"></div>
    </div>

    <script>
        // Fix for the "YaGames" error in your screenshot
        window.YaGames = { init: () => Promise.resolve({ deviceInfo: {type:'desktop'}, adv: {showFullscreenAdv:()=>{}} }) };

        function play(game) {
            document.getElementById('hub').style.display = 'none';
            document.querySelector('nav').style.display = 'none';
            const overlay = document.getElementById('game-overlay');
            const mount = document.getElementById('mount');
            overlay.style.display = 'block';

            if (game === 'granny') {
                const canvas = document.createElement('canvas');
                canvas.id = "unity-canvas";
                mount.appendChild(canvas);
                loadGranny(canvas);
            } else {
                document.getElementById('load-status').style.display = 'none';
                mount.innerHTML = `<iframe src="https://space-waves.co/game/space-waves/" allow="autoplay; fullscreen"></iframe>`;
            }
        }

        function loadGranny(canvas) {
            const loader = document.createElement("script");
            // Direct link to the loader
            loader.src = "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build/Granny.loader.js";
            
            loader.onload = () => {
                const config = {
                    dataUrl: "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build/Granny.data",
                    frameworkUrl: "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build/Granny.framework.js",
                    codeUrl: "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/Build/Granny.wasm",
                    streamingAssetsUrl: "https://cdn.jsdelivr.net/gh/gru6nny/ohd@main/StreamingAssets",
                    companyName: "DVloper",
                    productName: "Granny",
                };

                createUnityInstance(canvas, config, (p) => {
                    document.getElementById('load-status').innerText = "Loading: " + Math.round(p * 100) + "%";
                }).catch(err => {
                    document.getElementById('load-status').innerHTML = "<b>Error:</b> Browser blocked the game files.<br>Try running this on a website like GitHub Pages or Replit.";
                });
            };
            document.body.appendChild(loader);
        }
    </script>
</body>
</html>
