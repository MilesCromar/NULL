<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | Archive</title>
    <style>
        /* --- High Visibility Dark Theme --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #222222 0%, #0a0a0a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #eeeeee;
            overflow: hidden;
            transition: opacity 0.5s ease;
        }

        /* --- Menu Section --- */
        #menu-ui {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
        }

        .header-text {
            text-align: center;
            margin-bottom: 70px;
        }

        .header-text h1 {
            font-size: 5.5rem;
            letter-spacing: 25px;
            text-transform: uppercase;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            margin-left: 25px;
        }

        .header-text p {
            color: #666;
            letter-spacing: 8px;
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: bold;
        }

        /* --- Visible Cards --- */
        .card-container {
            display: flex;
            gap: 40px;
            perspective: 1000px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            width: 300px;
            height: 400px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: border-color 0.5s ease, background 0.5s ease, box-shadow 0.5s ease;
        }

        .game-card:hover {
            background: rgba(0, 31, 63, 0.3);
            border-color: #0074D9;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        .card-content {
            transform: translateZ(20px); 
            text-align: center;
        }

        .card-content h2 {
            font-size: 2.2rem;
            color: #cccccc;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .card-content .sub-text {
            display: block;
            font-size: 0.9rem;
            color: #888;
            letter-spacing: 2px;
            margin-top: 8px;
            margin-bottom: 35px;
        }

        /* --- The Button (Lights up) --- */
        .play-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #aaaaaa;
            padding: 12px 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 800;
            letter-spacing: 3px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .game-card:hover .play-btn {
            color: #ffffff;
            border-color: #0074D9;
            background: #001f3f;
            box-shadow: 0 0 20px rgba(0, 116, 217, 0.6);
        }

        .locked {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* --- Game Player Overlay --- */
        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            z-index: 100;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* --- Back Button --- */
        .back-bar {
            background: #0a0a0a;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .back-btn {
            color: #666;
            text-decoration: none;
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 5px 15px;
            border: 1px solid #333;
            border-radius: 4px;
            transition: 0.3s;
        }

        .back-btn:hover {
            color: #fff;
            border-color: #0074D9;
            background: rgba(0, 116, 217, 0.1);
        }

        .menu-hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="menu-ui">
        <div class="header-text">
            <h1>NULL</h1>
            <p>SYSTEM ARCHIVE</p>
        </div>

        <div class="card-container">
            <div class="game-card" onclick="launchGame('granny.html')">
                <div class="card-content">
                    <h2>Granny</h2>
                    <span class="sub-text">CHAPTER ONE</span>
                    <div class="play-btn">LAUNCH</div>
                </div>
            </div>

            <div class="game-card locked">
                <div class="card-content">
                    <h2>VOID</h2>
                    <span class="sub-text">ENCRYPTED</span>
                    <div class="play-btn">LOCKED</div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="back-bar">
            <a href="javascript:void(0)" class="back-btn" onclick="closeGame()">← Back to Archive</a>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        // Tilt Effect Configuration
        VanillaTilt.init(document.querySelectorAll(".game-card"), {
            reverse: true,
            max: 3,
            speed: 2000,
            glare: true,
            "max-glare": 0.2,
            scale: 1
        });

        function launchGame(url) {
            const menu = document.getElementById('menu-ui');
            const container = document.getElementById('game-container');
            const frame = document.getElementById('game-frame');

            menu.classList.add('menu-hidden');
            container.style.display = 'flex';
            frame.src = url; 
        }

        function closeGame() {
            const menu = document.getElementById('menu-ui');
            const container = document.getElementById('game-container');
            const frame = document.getElementById('game-frame');

            menu.classList.remove('menu-hidden');
            container.style.display = 'none';
            frame.src = ''; // Stops the Unity game processes/sound
        }
    </script>
</body>
</html>
