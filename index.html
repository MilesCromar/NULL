<!DOCTYPE html>
<html lang="en">
<head>
    <title>Game Library</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background-color: #f0f2f5; font-family: sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        nav { padding: 15px; display: flex; justify-content: center; background: #fff; border-bottom: 1px solid #e2e8f0; color: #64748b; font-size: 0.8rem; font-weight: 600; }
        .container { flex: 1; display: flex; align-items: center; justify-content: center; gap: 25px; padding: 40px; flex-wrap: wrap; }
        .card { background: white; padding: 35px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; width: 280px; }
        .btn-launch { background-color: #007bff; color: white; border: none; padding: 14px; border-radius: 6px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 20px; text-transform: uppercase; font-size: 0.85rem; }
        .btn-launch:hover { background-color: #0056b3; }
        
        #stage { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        .controls { position: absolute; top: 15px; left: 15px; z-index: 1001; display: flex; gap: 10px; }
        .ctrl-btn { color: white; cursor: pointer; background: rgba(0,0,0,0.6); padding: 8px 15px; border: 1px solid #fff; font-size: 0.7rem; border-radius: 4px; text-decoration: none; }
        #status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #007bff; font-family: monospace; font-size: 1.2rem; }
        iframe, canvas { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <nav>BUILD_v1.0.8</nav>

    <div class="container" id="hub">
        <div class="card">
            <h2>Granny</h2>
            <p>Original Horror Assets (v1.8)</p>
            <button class="btn-launch" onclick="launch('granny')">Launch</button>
        </div>
        <div class="card">
            <h2>Space Waves</h2>
            <p>High-Speed Geometric Arcade</p>
            <button class="btn-launch" onclick="launch('spacewaves')">Launch</button>
        </div>
    </div>

    <div id="stage">
        <div class="controls">
            <div class="ctrl-btn" onclick="location.reload()">BACK TO LIBRARY</div>
        </div>
        <div id="status">INITIALIZING...</div>
        <div id="mount" style="width:100%; height:100%;"></div>
    </div>

    <script>
        // CRITICAL: Block the "YaGames" errors from the console
        window.YaGames = { init: () => Promise.resolve({ deviceInfo: {type: 'desktop'}, adv: {showFullscreenAdv: () => {}} }) };
        window.ysdk = window.YaGames;

        function launch(id) {
            document.getElementById('hub').style.display = 'none';
            document.querySelector('nav').style.display = 'none';
            document.getElementById('stage').style.display = 'block';
            const mount = document.getElementById('mount');

            if (id === 'granny') {
                // We are using a more stable WebGL host for Granny
                mount.innerHTML = `<iframe src="https://grannyfree.io/play/granny/" allow="autoplay; fullscreen" style="width:100%; height:100%; border:none;"></iframe>`;
                document.getElementById('status').style.display = 'none';
            } else {
                document.getElementById('status').style.display = 'none';
                mount.innerHTML = `<iframe src="https://space-waves.co/game/space-waves/" allow="autoplay; fullscreen" style="width:100%; height:100%; border:none;"></iframe>`;
            }
        }
    </script>
</body>
</html>
