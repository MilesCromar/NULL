<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granny | Escape</title>
    <style>
        /* --- Dark, Nonchalant Theme --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d1d1d1;
            overflow: hidden;
        }

        .header-text {
            text-align: center;
            margin-bottom: 80px;
        }

        .header-text h1 {
            font-size: 4.5rem;
            letter-spacing: 18px;
            text-transform: uppercase;
            font-weight: 800;
            color: #ffffff;
            opacity: 0.8;
        }

        .header-text p {
            color: #333;
            letter-spacing: 5px;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        /* --- Reactive Cards --- */
        .card-container {
            display: flex;
            gap: 40px;
            perspective: 1000px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.02);
            width: 280px;
            height: 380px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            cursor: pointer;
            
            /* 3D Depth */
            transform-style: preserve-3d;
            transition: border-color 0.8s ease, background 0.8s ease;
        }

        .game-card:hover {
            background: rgba(0, 31, 63, 0.1);
            border-color: rgba(0, 116, 217, 0.2);
        }

        .card-content {
            transform: translateZ(20px); /* Minimal pop out */
            text-align: center;
        }

        .card-content h2 {
            font-size: 1.6rem;
            margin-bottom: 25px;
            color: #555; /* Very muted gray */
            letter-spacing: 2px;
            transition: color 0.6s ease;
        }

        .game-card:hover h2 {
            color: #ffffff;
        }

        /* --- Simple Ghost Buttons --- */
        .play-btn {
            background: transparent;
            color: #333;
            padding: 10px 24px;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 6px;
            transition: all 0.6s ease;
        }

        .game-card:hover .play-btn {
            color: #0074D9;
            border-color: #0074D9;
            background: rgba(0, 116, 217, 0.03);
        }

        .locked {
            opacity: 0.2;
            cursor: default;
        }
    </style>
</head>
<body>

    <div class="header-text">
        <h1>GRANNY</h1>
        <p>STAY QUIET</p>
    </div>

    <div class="card-container">
        <div class="game-card" data-tilt>
            <div class="card-content">
                <h2>HOUSE</h2>
                <a href="#" class="play-btn">ENTER</a>
            </div>
        </div>

        <div class="game-card locked" data-tilt>
            <div class="card-content">
                <h2>ASYLUM</h2>
                <a href="#" class="play-btn">LOCKED</a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        VanillaTilt.init(document.querySelectorAll(".game-card"), {
            reverse: true,    // This makes it tilt AWAY from the mouse
            max: 3,           // Very tiny tilt angle (3 degrees)
            speed: 3000,      // Extremely slow movement (very chill)
            glare: true,
            "max-glare": 0.1, // Very subtle light reflection
            scale: 1.01       // Almost zero zoom
        });
    </script>

</body>
</html>
