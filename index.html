<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Granny | Escape</title>
    <style>
        /* --- Clean & Calm Theme --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            /* Deep charcoal to black gradient */
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #d1d1d1;
            overflow: hidden;
        }

        /* Bold text in the middle */
        .header-text {
            text-align: center;
            margin-bottom: 80px;
        }

        .header-text h1 {
            font-size: 4.5rem;
            letter-spacing: 18px;
            text-transform: uppercase;
            font-weight: 800;
            color: #ffffff;
            opacity: 0.9;
        }

        .header-text p {
            color: #444;
            letter-spacing: 5px;
            font-size: 0.75rem;
            margin-top: 10px;
        }

        /* --- Clean Card Layout --- */
        .card-container {
            display: flex;
            gap: 30px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.02); /* Very faint gray */
            width: 260px;
            height: 340px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); /* Super smooth movement */
        }

        /* Nonchalant Hover: Subtle lift and navy glow */
        .game-card:hover {
            transform: translateY(-8px);
            background: rgba(0, 31, 63, 0.15); /* Faint navy tint */
            border-color: rgba(0, 116, 217, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .card-content h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #888;
            letter-spacing: 2px;
            transition: color 0.4s;
        }

        .game-card:hover h2 {
            color: #ffffff;
        }

        /* --- Nonchalant Buttons --- */
        .play-btn {
            background: transparent;
            color: #555;
            padding: 8px 20px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 4px;
            transition: all 0.4s ease;
        }

        .game-card:hover .play-btn {
            color: #0074D9; /* Navy blue accent on hover */
            border-color: #0074D9;
            background: rgba(0, 116, 217, 0.05);
        }

        /* Locked State */
        .locked {
            opacity: 0.2;
            cursor: default;
        }
        
        .locked:hover {
            transform: none;
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body>

    <div class="header-text">
        <h1>GRANNY</h1>
        <p>QUIET IS SURVIVAL</p>
    </div>

    <div class="card-container">
        <div class="game-card">
            <div class="card-content">
                <h2>HOUSE</h2>
                <a href="#" class="play-btn">ENTER</a>
            </div>
        </div>

        <div class="game-card locked">
            <div class="card-content">
                <h2>ASYLUM</h2>
                <a href="#" class="play-btn">LOCKED</a>
            </div>
        </div>
    </div>

</body>
</html>
