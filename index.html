<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | Archive</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22Inter, Arial, sans-serif%22 font-weight=%22900%22 fill=%22white%22>N</text></svg>">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Arial, sans-serif;
            cursor: crosshair;
        }

        body {
            /* Black background with a whiter/lighter center */
            background: radial-gradient(circle at center, #333333 0%, #000000 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #eeeeee;
            overflow: hidden;
        }

        /* Subtle Scanline Overlay */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            z-index: 2;
            background-size: 100% 4px;
            pointer-events: none;
            opacity: 0.3;
        }

        #menu-ui {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            transition: opacity 0.4s ease;
        }

        .header-text {
            text-align: center;
            margin-bottom: 50px;
        }

        .header-text h1 {
            font-size: 5rem;
            letter-spacing: 20px;
            text-transform: uppercase;
            font-weight: 900;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .header-text p {
            color: #888;
            letter-spacing: 8px;
            font-size: 0.8rem;
            margin-top: 5px;
            font-weight: bold;
        }

        .card-container {
            display: flex;
            gap: 25px;
            perspective: 1000px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            width: 270px;
            height: 380px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .game-card:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: #ffffff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        }

        .card-content {
            text-align: center;
            pointer-events: none;
        }

        .card-content h2 {
            font-size: 1.8rem;
            color: #ffffff;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .card-content .sub-text {
            display: block;
            font-size: 0.7rem;
            color: #666;
            letter-spacing: 2px;
            margin-top: 8px;
            margin-bottom: 30px;
        }

        .play-btn {
            background: transparent;
            color: #fff;
            padding: 10px 25px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 3px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .game-card:hover .play-btn {
            background: #fff;
            color: #000;
        }

        #game-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            z-index: 100;
        }

        iframe {
            width: 100%; height: 100%;
            border: none;
        }

        .back-bar {
            background: #000;
            padding: 15px 25px;
            border-bottom: 1px solid #222;
        }

        .back-btn {
            color: #888;
            font-size: 0.7rem;
            letter-spacing: 2px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .back-btn:hover { color: #fff; }

        .menu-hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="menu-ui">
        <div class="header-text">
            <h1>NULL</h1>
            <p>SYSTEM ARCHIVE</p>
        </div>

        <div class="card-container">
            <div class="game-card" onclick="launchGame('granny.html')">
                <div class="card-content">
                    <h2>Granny</h2>
                    <span class="sub-text">CHAPTER ONE</span>
                    <div class="play-btn">LAUNCH</div>
                </div>
            </div>

            <div class="game-card" onclick="launchGame('spacewaves.html')">
                <div class="card-content">
                    <h2>Space Waves</h2>
                    <span class="sub-text">GEOMETRY GAME</span>
                    <div class="play-btn">LAUNCH</div>
                </div>
            </div>

            <div class="game-card" onclick="launchGame('granny2.html')">
                <div class="card-content">
                    <h2>Granny 2</h2>
                    <span class="sub-text">CHAPTER TWO</span>
                    <div class="play-btn">LAUNCH</div>
                </div>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="back-bar">
            <div class="back-btn" onclick="closeGame()">← Back to Archive</div>
        </div>
        <iframe id="game-frame" src=""></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        // Initialize 3D tilt effect
        VanillaTilt.init(document.querySelectorAll(".game-card"), {
            max: 5,
            speed: 400,
            glare: true,
            "max-glare": 0.1,
        });

        function launchGame(url) {
            document.getElementById('menu-ui').classList.add('menu-hidden');
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('game-frame').src = url; 
        }

        function closeGame() {
            document.getElementById('menu-ui').classList.remove('menu-hidden');
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('game-frame').src = ''; 
        }
    </script>
</body>
</html>
