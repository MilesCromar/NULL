<!DOCTYPE html>
<html lang="en">
<head>
    <title>Library</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Unified Dark Theme */
        body { 
            margin: 0; 
            background: #0a0a0a; 
            font-family: -apple-system, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            color: #fff;
        }
        
        /* Matching Nav */
        nav { 
            padding: 15px; 
            display: flex; 
            justify-content: center; 
            background: #000; 
            border-bottom: 1px solid #1a1a1a; 
        }
        .v { font-family: monospace; font-size: 10px; color: #3b82f6; opacity: 0.7; }

        .hub { flex: 1; display: flex; align-items: center; justify-content: center; gap: 20px; }
        
        /* The Card now matches the Stage */
        .card { 
            background: #111; 
            padding: 30px; 
            border-radius: 4px; 
            border: 1px solid #222;
            text-align: center; 
            width: 220px; 
            transition: border 0.3s;
        }
        .card:hover { border-color: #3b82f6; }
        h2 { margin: 0 0 20px; font-size: 18px; font-weight: 500; letter-spacing: 1px; }
        
        button { 
            background: transparent; 
            color: #3b82f6; 
            border: 1px solid #3b82f6; 
            padding: 10px; 
            border-radius: 2px; 
            cursor: pointer; 
            width: 100%; 
            font-weight: bold; 
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 1px;
            transition: 0.2s;
        }
        button:hover { background: #3b82f6; color: #000; }

        /* Stage Overlay */
        #stage { display: none; position: fixed; inset: 0; background: #000; z-index: 100; }
        
        #loading {
            position: absolute; inset: 0; background: #000; display: flex; 
            align-items: center; justify-content: center; z-index: 110; color: #fff;
            font-family: monospace; font-size: 14px; letter-spacing: 2px;
        }
