
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | Library</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            min-height: 100vh;
            color: #eee;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .back-home {
            position: absolute; top: 20px; left: 20px;
            color: #666; text-decoration: none; font-size: 0.7rem; font-weight: bold;
            border: 1px solid #333; padding: 5px 15px; border-radius: 4px;
        }
        .header-text h1 { letter-spacing: 10px; margin-bottom: 40px; color: #fff; }
        
        .card-container {
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1200px; perspective: 1000px;
        }

        /* --- New Square Card Style --- */
        .game-card {
            background: rgba(255, 255, 255, 0.03);
            width: 250px; height: 250px; /* Square size */
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.4s ease; transform-style: preserve-3d;
        }
        .game-card:hover { border-color: #0074D9; background: rgba(0, 31, 63, 0.3); }

        .card-content h2 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; text-align: center;}
        .sub-text { font-size: 0.6rem; color: #666; letter-spacing: 2px; display: block; margin-top: 10px;}

        /* --- Chapter Buttons Inside Square --- */
        .chapter-selection { display: flex; gap: 5px; margin-bottom: 10px; }
        .chap-btn { 
            background: #111; border: 1px solid #333; color: #555; 
            font-size: 0.6rem; padding: 3px 8px; cursor: pointer; 
        }
        .chap-btn.active { border-color: #0074D9; color: #fff; }

        /* --- Overlay Fixes --- */
        #game-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; display: none; flex-direction: column; z-index: 100; }
        iframe { width: 100%; height: 100%; border: none; background: #000; }
        .back-bar { background: #000; padding: 10px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>
    <a href="index.html" class="back-home">← EXIT LIBRARY</a>
    <div class="header-text"><h1>LIBRARY</h1></div>

    <div class="card-container">
        <div class="game-card" id="granny-card">
            <div class="card-content">
                <h2>Granny</h2>
                <div class="chapter-selection" onclick="event.stopPropagation()">
                    <button class="chap-btn active" onclick="selectChapter(1, this)">CH 1</button>
                    <button class="chap-btn" onclick="selectChapter(2, this)">CH 2</button>
                </div>
                <div class="chap-btn" style="border:none; pointer-events:none;" id="chapter-label">CHAPTER ONE</div>
                <div class="chap-btn" style="margin-top:10px; color:#fff; border-color:#0074D9" onclick="launchGranny()">LAUNCH</div>
            </div>
        </div>

        <div class="game-card" onclick="launchGame('pvz.html')">
            <div class="card-content">
                <h2>PvZ</h2>
                <span class="sub-text">STRATEGY</span>
            </div>
        </div>

        <div class="game-card" onclick="launchGame('run3.html')">
            <div class="card-content">
                <h2>Run 3</h2>
                <span class="sub-text">ACTION</span>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="back-bar"><div class="chap-btn" onclick="closeGame()">← BACK TO LIBRARY</div></div>
        <iframe id="game-frame" src="" allowtransparency="true"></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        VanillaTilt.init(document.querySelectorAll(".game-card"), { max: 10, speed: 400, glare: true, "max-glare": 0.2 });

        let selectedChapter = 1;
        function selectChapter(chap, btn) {
            selectedChapter = chap;
            document.querySelectorAll('.chap-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('chapter-label').innerText = chap === 1 ? "CHAPTER ONE" : "CHAPTER TWO";
        }

        function launchGranny() { launchGame(selectedChapter === 1 ? 'granny.html' : 'granny2.html'); }
        function launchGame(url) {
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('game-frame').src = url;
        }
        function closeGame() {
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('game-frame').src = '';
        }
    </script>
</body>
</html>
