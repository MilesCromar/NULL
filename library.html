<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NULL | Library</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22Inter, Arial, sans-serif%22 font-weight=%22900%22 fill=%22white%22>N</text></svg>">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; cursor: default; }
        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            min-height: 100vh;
            color: #eee;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .btn-top-left {
            position: absolute; top: 20px; left: 20px;
            color: #666; text-decoration: none; font-size: 0.7rem; font-weight: bold;
            border: 1px solid #333; padding: 5px 15px; border-radius: 4px;
            transition: 0.3s;
            background: transparent;
            text-transform: uppercase;
            z-index: 10; 
        }
        .btn-top-left:hover { color: #fff; border-color: #0074D9; box-shadow: 0 0 10px rgba(0, 116, 217, 0.4); }

        .btn-top-right {
            position: absolute; top: 20px; right: 20px;
            color: #666; text-decoration: none; font-size: 0.7rem; font-weight: bold;
            border: 1px solid #333; padding: 5px 15px; border-radius: 4px;
            transition: 0.3s;
            background: transparent;
            text-transform: uppercase;
            z-index: 10;
            cursor: pointer;
        }
        .btn-top-right:hover { color: #fff; border-color: #0074D9; box-shadow: 0 0 10px rgba(0, 116, 217, 0.4); }

        .header-text h1 { letter-spacing: 10px; margin-bottom: 40px; color: #fff; text-transform: uppercase; }
        
        .card-container {
            display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; max-width: 1200px; perspective: 1000px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.03);
            width: 260px; height: 260px; 
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.4s ease; transform-style: preserve-3d;
            padding: 20px;
        }
        .game-card:hover { border-color: #0074D9; background: rgba(0, 31, 63, 0.3); }

        .card-content { text-align: center; transform: translateZ(20px); width: 100%; }
        .card-content h2 { font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
        .sub-text { font-size: 0.7rem; color: #666; letter-spacing: 2px; display: block; margin-bottom: 15px; text-transform: uppercase; }

        .chapter-selection { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
        .chap-btn { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            color: #666; 
            font-size: 0.65rem; padding: 4px 10px; cursor: pointer; 
            font-weight: bold; border-radius: 4px; transition: 0.3s;
        }
        .chap-btn.active { border-color: #0074D9; color: #fff; background: rgba(0, 116, 217, 0.2); }

        .launch-btn {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
            color: #888;
            padding: 8px 25px;
            font-size: 0.75rem;
            font-weight: 800;
            letter-spacing: 2px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .game-card:hover .launch-btn {
            color: #fff;
            border-color: #0074D9;
            background: #001f3f;
            box-shadow: 0 0 15px rgba(0, 116, 217, 0.5);
        }

        #game-container { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: #000; display: none; flex-direction: column; z-index: 100; 
        }
        
        .back-bar { 
            background: #000; 
            height: 65px; 
            width: 100%;
            position: relative;
            z-index: 110;
            border-bottom: 1px solid #111; 
        }

        /* NEW: Hide the bar when in fullscreen mode */
        #game-container:fullscreen .back-bar { display: none; }
        #game-container:fullscreen iframe { height: 100vh; }

        .back-bar .btn-top-left {
            position: absolute;
            top: 20px; left: 20px;
        }

        iframe { width: 100%; height: calc(100% - 65px); border: none; background: #000; }
    </style>
</head>
<body>
    <a href="index.html" class="btn-top-left" id="exit-lib">← EXIT LIBRARY</a>
    <div class="header-text"><h1>LIBRARY</h1></div>

    <div class="card-container">
        <div class="game-card">
            <div class="card-content">
                <h2>Granny</h2>
                <div class="chapter-selection" onclick="event.stopPropagation()">
                    <button class="chap-btn active" onclick="selectChapter(1, this)">CH 1</button>
                    <button class="chap-btn" onclick="selectChapter(2, this)">CH 2</button>
                </div>
                <span class="sub-text" id="chapter-label">CHAPTER ONE</span>
                <div class="launch-btn" onclick="launchGranny()">LAUNCH</div>
            </div>
        </div>

        <div class="game-card" onclick="launchGame('pvz.html')">
            <div class="card-content">
                <h2>PvZ</h2>
                <span class="sub-text">STRATEGY</span>
                <div class="launch-btn">LAUNCH</div>
            </div>
        </div>

        <div class="game-card" onclick="launchGame('run3.html')">
            <div class="card-content">
                <h2>Run 3</h2>
                <span class="sub-text">ACTION</span>
                <div class="launch-btn">LAUNCH</div>
            </div>
        </div>

        <div class="game-card" onclick="launchGame('driftboss.html')">
            <div class="card-content">
                <h2>Drift Boss</h2>
                <span class="sub-text">ARCADE</span>
                <div class="launch-btn">LAUNCH</div>
            </div>
        </div>

        <div class="game-card" onclick="launchGame('spacewaves.html')">
            <div class="card-content">
                <h2>Space Waves</h2>
                <span class="sub-text">ARCADE</span>
                <div class="launch-btn">LAUNCH</div>
            </div>
        </div>
    </div>

    <div id="game-container">
        <div class="back-bar">
            <button class="btn-top-left" onclick="closeGame()">← BACK TO LIBRARY</button>
            <button class="btn-top-right" onclick="toggleFullscreen()">FULLSCREEN</button>
        </div>
        <iframe id="game-frame" src="" allowfullscreen="true" allowtransparency="true"></iframe>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js"></script>
    <script>
        VanillaTilt.init(document.querySelectorAll(".game-card"), { max: 8, speed: 400, glare: true, "max-glare": 0.2 });

        let selectedChapter = 1;
        function selectChapter(chap, btn) {
            selectedChapter = chap;
            const parent = btn.closest('.card-content');
            parent.querySelectorAll('.chap-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            parent.querySelector('#chapter-label').innerText = chap === 1 ? "CHAPTER ONE" : "CHAPTER TWO";
        }

        function launchGranny() { launchGame(selectedChapter === 1 ? 'granny.html' : 'granny2.html'); }
        
        function launchGame(url) {
            document.getElementById('exit-lib').style.display = 'none';
            document.getElementById('game-container').style.display = 'flex';
            document.getElementById('game-frame').src = url;
        }

        function closeGame() {
            document.getElementById('exit-lib').style.display = 'block';
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('game-frame').src = '';
            if (document.fullscreenElement) document.exitFullscreen();
        }

        function toggleFullscreen() {
            const elem = document.getElementById('game-container');
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => alert(`Error: ${err.message}`));
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
